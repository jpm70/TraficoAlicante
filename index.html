<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alicante Tráfico · Cámaras en vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --surface: #111318;
    --surface2: #181c24;
    --border: #1e2330;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #22c55e;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --text-muted: #334155;
    --card-h: 200px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,12,16,0.95); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 1.5rem; display: flex; align-items: center; gap: 1rem; height: 56px;
  }
  .logo { display: flex; align-items: center; gap: .6rem; font-size: 1rem; font-weight: 800; letter-spacing: -.02em; white-space: nowrap; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 10px var(--accent); animation: blink 2s infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .header-badge { font-family: 'DM Mono', monospace; font-size: .65rem; color: var(--text-dim); border: 1px solid var(--border); padding: .15rem .5rem; border-radius: 4px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: .75rem; }
  #refresh-btn {
    background: var(--surface2); border: 1px solid var(--border); color: var(--text);
    font-family: 'Syne', sans-serif; font-size: .75rem; font-weight: 700;
    padding: .4rem .85rem; border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; gap: .4rem; transition: border-color .2s;
  }
  #refresh-btn:hover { border-color: var(--accent); }
  #refresh-btn.spinning svg { animation: spin .6s linear; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .live-pill {
    font-family: 'DM Mono', monospace; font-size: .65rem;
    background: rgba(34,197,94,.12); color: var(--green);
    border: 1px solid rgba(34,197,94,.25); padding: .2rem .6rem; border-radius: 99px;
    display: flex; align-items: center; gap: .35rem;
  }
  .live-pill::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 1.5s infinite; }

  /* LAYOUT */
  .app { display: flex; height: calc(100vh - 56px); }

  /* SIDEBAR */
  aside { width: 270px; min-width: 270px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .sidebar-head { padding: 1rem; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: .6rem; }
  .sidebar-title { font-size: .65rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--text-dim); }
  #search { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: .5rem .75rem; color: var(--text); font-family: 'DM Mono', monospace; font-size: .75rem; width: 100%; outline: none; transition: border-color .2s; }
  #search::placeholder { color: var(--text-muted); }
  #search:focus { border-color: var(--accent); }
  .cam-list { flex: 1; overflow-y: auto; padding: .5rem; }
  .cam-list::-webkit-scrollbar { width: 4px; }
  .cam-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .cam-item { display: flex; align-items: center; gap: .6rem; padding: .6rem .75rem; border-radius: 6px; cursor: pointer; transition: background .15s; user-select: none; }
  .cam-item:hover { background: var(--surface2); }
  .cam-item.active { background: rgba(0,212,255,.08); }
  .cam-check { width: 16px; height: 16px; min-width: 16px; border: 1.5px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; transition: all .15s; }
  .cam-item.active .cam-check { background: var(--accent); border-color: var(--accent); }
  .cam-check-icon { display: none; }
  .cam-item.active .cam-check-icon { display: block; }
  .cam-label { font-size: .8rem; line-height: 1.3; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-footer { padding: .75rem 1rem; border-top: 1px solid var(--border); display: flex; gap: .5rem; }
  .sidebar-footer button { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); font-family: 'Syne', sans-serif; font-size: .7rem; font-weight: 700; padding: .45rem; border-radius: 6px; cursor: pointer; transition: all .15s; }
  .sidebar-footer button:hover { color: var(--text); border-color: var(--accent); }

  /* MAIN */
  main { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
  .top-bar { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
  .count-badge { font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--text-dim); }
  .count-badge span { color: var(--accent); font-weight: 500; }
  .layout-btns { margin-left: auto; display: flex; gap: .4rem; }
  .layout-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text-dim); padding: .4rem .5rem; border-radius: 6px; cursor: pointer; transition: all .15s; display: flex; align-items: center; }
  .layout-btn:hover, .layout-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,.06); }

  /* GRID */
  #grid { display: grid; gap: .85rem; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); }
  #grid.layout-1 { grid-template-columns: 1fr; }
  #grid.layout-2 { grid-template-columns: repeat(2,1fr); }
  #grid.layout-3 { grid-template-columns: repeat(3,1fr); }

  /* CARD */
  .cam-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; transition: border-color .2s, transform .15s; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .cam-card:hover { border-color: rgba(0,212,255,.35); transform: translateY(-1px); }

  /* iframe wraper — solución definitiva al CORS */
  .cam-frame-wrap { position: relative; height: var(--card-h); background: #060810; overflow: hidden; cursor: pointer; }
  .cam-frame-wrap iframe { width: 100%; height: 100%; border: none; pointer-events: none; display: block; }
  .frame-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.55) 0%, transparent 55%); display: flex; align-items: flex-start; justify-content: flex-end; padding: .4rem; }
  .expand-btn { background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.12); border-radius: 4px; padding: .2rem .4rem; font-size: .6rem; font-family: 'DM Mono', monospace; color: rgba(255,255,255,.55); opacity: 0; transition: opacity .2s; }
  .cam-card:hover .expand-btn { opacity: 1; }

  .cam-card-body { padding: .6rem .75rem; display: flex; align-items: center; gap: .5rem; }
  .cam-card-name { font-size: .78rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .cam-ts { font-family: 'DM Mono', monospace; font-size: .6rem; color: var(--text-dim); white-space: nowrap; }

  /* EMPTY */
  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .empty h3 { font-size: 1.1rem; margin-bottom: .5rem; color: var(--text-dim); }
  .empty p { font-size: .8rem; font-family: 'DM Mono', monospace; }

  /* LIGHTBOX */
  #lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,.88); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 1rem; }
  #lightbox.open { display: flex; }
  #lightbox-inner { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; max-width: 900px; width: 100%; animation: lbIn .2s ease; display: flex; flex-direction: column; }
  @keyframes lbIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  #lightbox-frame { width: 100%; height: 65vh; border: none; background: #060810; display: block; }
  #lightbox-bar { padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; border-top: 1px solid var(--border); }
  #lightbox-name { font-size: .9rem; font-weight: 700; flex: 1; }
  #lightbox-close { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'Syne', sans-serif; font-size: .75rem; font-weight: 700; padding: .4rem .8rem; border-radius: 6px; cursor: pointer; transition: border-color .15s; }
  #lightbox-close:hover { border-color: var(--accent2); color: var(--accent2); }

  /* MOBILE */
  @media (max-width: 700px) {
    :root { --card-h: 170px; }
    .app { flex-direction: column; height: auto; }
    aside { width: 100%; min-width: 0; max-height: 230px; border-right: none; border-bottom: 1px solid var(--border); }
    main { padding: .75rem; }
    #grid, #grid.layout-2, #grid.layout-3 { grid-template-columns: 1fr; }
    .layout-btns { display: none; }
    #lightbox-frame { height: 50vw; min-height: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-dot"></div>ALICANTE TRÁFICO</div>
  <span class="header-badge">CÁMARAS · TIEMPO REAL</span>

    <span class="live-pill">EN VIVO</span>

      Actualizar

</header>

<div class="app">

    </div>
    <div class="cam-list" id="cam-list"></div>
    <div class="sidebar-footer">
      <button id="btn-all">Todas</button>
      <button id="btn-none">Ninguna</button>
    </div>
  </aside>

  <main>
    <div class="top-bar">
      <div class="count-badge">Mostrando <span id="count">0</span> cámaras</div>
      <div class="layout-btns">
        <button class="layout-btn" data-layout="1" title="1 columna">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="1" width="12" height="5" rx="1"/><rect x="1" y="8" width="12" height="5" rx="1"/></svg>
        </button>
        <button class="layout-btn active" data-layout="2" title="2 columnas">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="1" width="5.5" height="5" rx="1"/><rect x="7.5" y="1" width="5.5" height="5" rx="1"/><rect x="1" y="8" width="5.5" height="5" rx="1"/><rect x="7.5" y="8" width="5.5" height="5" rx="1"/></svg>
        </button>
        <button class="layout-btn" data-layout="3" title="3 columnas">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="1" y="1" width="3.3" height="5" rx="1"/><rect x="5.35" y="1" width="3.3" height="5" rx="1"/><rect x="9.7" y="1" width="3.3" height="5" rx="1"/><rect x="1" y="8" width="3.3" height="5" rx="1"/><rect x="5.35" y="8" width="3.3" height="5" rx="1"/><rect x="9.7" y="8" width="3.3" height="5" rx="1"/></svg>
        </button>
      </div>
    </div>
    <div id="grid" class="layout-2"></div>
  </main>
</div>

<div id="lightbox">
  <div id="lightbox-inner">
    <iframe id="lightbox-frame" src="about:blank" scrolling="no" title="Cámara ampliada"></iframe>
    <div id="lightbox-bar">
      <span id="lightbox-name"></span>
      <button id="lightbox-close">✕ Cerrar</button>
    </div>
  </div>
</div>

// Deduplicar
const seen = new Set();
const cameras = CAMERAS.filter(c => { if (seen.has(c.url)) return false; seen.add(c.url); return true; });

let selected = new Set(cameras.slice(0, 6).map((_, i) => i));
let currentLayout = 2;

// URL con cache-bust por minuto
function liveUrl(url) {
  return url.split('?')[0] + '?_t=' + Math.floor(Date.now() / 60000);
}

// srcdoc: mini página HTML que carga la imagen. Esto bypasea CORS porque
// el contenido es local (blob / srcdoc) y la imagen se carga como recurso del documento hijo.
function makeSrcdoc(url, fit) {
  return `<!DOCTYPE html><html><head><style>
    *{margin:0;padding:0}
    body{background:#060810;width:100%;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
    img{width:100%;height:100%;object-fit:${fit || 'cover'};display:block}
  </style></head><body><img src="${liveUrl(url)}"></body></html>`;
}

function buildSidebar() {
  const list = document.getElementById('cam-list');
  list.innerHTML = '';
  const q = document.getElementById('search').value.toLowerCase();
  cameras.forEach((cam, i) => {
    if (q && !cam.name.toLowerCase().includes(q)) return;
    const div = document.createElement('div');
    div.className = 'cam-item' + (selected.has(i) ? ' active' : '');
    div.innerHTML = `
      <div class="cam-check">
        <svg class="cam-check-icon" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="#0a0c10" stroke-width="2.5" stroke-linecap="round"><polyline points="2,6 5,9 10,3"/></svg>
      </div>
      <span class="cam-label" title="${cam.name}">${cam.name}</span>`;
    div.addEventListener('click', () => toggleCam(i));
    list.appendChild(div);
  });
}

function toggleCam(i) {
  if (selected.has(i)) selected.delete(i); else selected.add(i);
  buildSidebar(); buildGrid();
}

function buildGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const active = cameras.map((c, i) => ({...c, i})).filter(c => selected.has(c.i));
  document.getElementById('count').textContent = active.length;

  if (!active.length) {
    grid.innerHTML = `<div class="empty"><h3>Sin cámaras seleccionadas</h3><p>Elige una o varias cámaras en el panel izquierdo</p></div>`;
    return;
  }

  const ts = new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});

  active.forEach(cam => {
    const card = document.createElement('div');
    card.className = 'cam-card';

    const wrap = document.createElement('div');
    wrap.className = 'cam-frame-wrap';

    const iframe = document.createElement('iframe');
    iframe.scrolling = 'no';
    iframe.title = cam.name;
    iframe.srcdoc = makeSrcdoc(cam.url, 'cover');

    const overlay = document.createElement('div');
    overlay.className = 'frame-overlay';
    overlay.innerHTML = `<span class="expand-btn">↗ ampliar</span>`;

    wrap.appendChild(iframe);
    wrap.appendChild(overlay);
    wrap.addEventListener('click', () => openLightbox(cam.url, cam.name));

    const body = document.createElement('div');
    body.className = 'cam-card-body';
    body.innerHTML = `<span class="cam-card-name">${cam.name}</span><span class="cam-ts">${ts}</span>`;

    card.appendChild(wrap);
    card.appendChild(body);
    grid.appendChild(card);
  });
}

function openLightbox(url, name) {
  document.getElementById('lightbox-name').textContent = name;
  document.getElementById('lightbox-frame').srcdoc = makeSrcdoc(url, 'contain');
  document.getElementById('lightbox').classList.add('open');
}

// Botones
document.getElementById('refresh-btn').addEventListener('click', () => {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  buildGrid();
  setTimeout(() => btn.classList.remove('spinning'), 650);
});
document.getElementById('btn-all').addEventListener('click', () => { cameras.forEach((_,i) => selected.add(i)); buildSidebar(); buildGrid(); });
document.getElementById('btn-none').addEventListener('click', () => { selected.clear(); buildSidebar(); buildGrid(); });
document.getElementById('search').addEventListener('input', buildSidebar);

document.querySelectorAll('.layout-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const n = parseInt(btn.dataset.layout);
    currentLayout = n;
    document.getElementById('grid').className = `layout-${n}`;
    document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b === btn));
  });
});

// Lightbox cerrar
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
document.getElementById('lightbox-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
});

// Auto-refresh cada 60 s
setInterval(buildGrid, 60000);

buildSidebar();
buildGrid();
</script>
</body>
</html>
